# DATABASE
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres

# Default schema for connections
spring.datasource.hikari.schema=task_app

# Hibernate reads from same schema
spring.jpa.properties.hibernate.default_schema=task_app

# HIBERNATE (read-only mode)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true



# FLYWAY (schema owner)
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=task_app
spring.flyway.default-schema=task_app